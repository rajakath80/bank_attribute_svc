# ─────────────────────────────────────────────────────────────────────────────
# bank-attribute-service · Docker Compose
#
# Services
# ────────
# redis   – In-memory cache (Alpine image, ~10 MB)
# app     – FastAPI service (hot-reload via volume mount for local dev)
#
# Usage
# ─────
#   docker compose up --build        # start everything
#   docker compose up redis          # only Redis (run app locally with uvicorn)
#   docker compose down -v           # stop + remove volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  redis:
    image: redis:7-alpine
    container_name: bas-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: bas-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bas-app
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      MAX_BATCH_SIZE: "2000000"
      CACHE_TTL_SECONDS: "300"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      # Mount source for hot-reload in development
      - .:/workspace
    working_dir: /workspace
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
